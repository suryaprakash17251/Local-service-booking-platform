<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalService – Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">Local<span>Service</span></div>

    <!-- LOGIN FORM -->
    <div id="loginBox">
      <h2>Welcome Back</h2>
      <p class="sub">Log in to book your next service</p>

      <div id="loginError" class="auth-error">Invalid email or password. Please try again.</div>

      <div class="input-group">
        <label>Email or Phone</label>
        <input id="loginEmail" type="email" placeholder="user@example.com">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input id="loginPassword" type="password" placeholder="Enter your password">
      </div>

      <div class="forgot-link">
        <a href="forgot.html">Forgot Password?</a>
      </div>

      <button onclick="login()">Log In</button>

      <div class="divider">Or</div>

      <button class="btn-google" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>

      <div class="link">Don't have an account? <a onclick="showSignup()">Sign Up</a></div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupBox" style="display:none;">
      <h2>Create Account</h2>
      <p class="sub" id="roleText">Join our community of local service providers and customers</p>

      <div class="input-group">
        <label>Full Name</label>
        <input id="name" placeholder="Harini">
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="name@example.com">
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input id="phone" placeholder="+91 9000000000">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="At least 8 characters">
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input id="confirmPassword" type="password" placeholder="Repeat your password">
      </div>

      <button onclick="signup()">Create Account</button>

      <div class="link">Already have an account? <a onclick="showLogin()">Log in</a></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
<script>
  const mode = localStorage.getItem('authMode');
  if (mode === 'signup') showSignup();

  document.getElementById("roleText").innerText =
    "Role: " + (localStorage.getItem("role") || "Customer");

  // Show error div on failed login
  const origLogin = window.login;
  window.login = async function() {
    document.getElementById('loginError').style.display = 'none';
    await origLogin();
  };
</script>

</body>
</html>
