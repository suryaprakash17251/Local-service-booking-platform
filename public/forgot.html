<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – LocalService</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Local<span>Service</span></div>
    <h2>Reset Password</h2>
    <p class="sub">Enter your email and we'll send you a reset link.</p>
    <div class="input-group">
      <label>Email Address</label>
      <input type="email" placeholder="you@example.com">
    </div>
    <button onclick="alert('Reset link sent! Check your email.'); window.location.href='auth.html';">Send Reset Link</button>
    <div class="link"><a href="auth.html">← Back to Login</a></div>
  </div>
</div>
</body>
</html>
